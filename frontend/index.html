<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Tracker</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --surface: #ffffff;
        --text: #0f172a;
        --text-secondary: #475569;
        --muted: #94a3b8;
        --border: #e2e8f0;
        --accent: #3b82f6;
        --accent-dark: #1d4ed8;
        --accent-soft: #eff6ff;
        --success: #10b981;
        --danger: #ef4444;
        --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.05);
        --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.08);
        --shadow-lg: 0 12px 32px rgba(15, 23, 42, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .page-header {
        padding: 2.5rem 1.5rem 1.5rem;
        background: linear-gradient(135deg, #1e293b 0%, #1e40af 100%);
        color: #ffffff;
        box-shadow: var(--shadow-sm);
      }

      .page-header-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1.5rem;
      }

      .page-header h1 {
        margin: 0 0 0.5rem;
        font-size: 2.25rem;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .page-header p {
        margin: 0;
        color: #cbd5e1;
        font-size: 0.95rem;
        font-weight: 500;
      }

      .new-task-button {
        border: none;
        border-radius: 10px;
        padding: 0.7rem 1.5rem;
        background: #ffffff;
        color: var(--accent-dark);
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 700;
        transition: all 0.2s ease;
        box-shadow: var(--shadow-sm);
        white-space: nowrap;
      }

      .new-task-button:hover {
        background: #f1f5f9;
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }

      .new-task-button:active {
        transform: translateY(0);
      }

      main {
        padding: 2rem 1.5rem;
        max-width: 1400px;
        margin: 0 auto;
      }

      .board {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 1.5rem;
        align-items: start;
      }

      .column {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--shadow-sm);
        padding: 1.5rem;
        transition: all 0.2s ease;
      }

      .column:hover {
        box-shadow: var(--shadow-md);
      }

      .column.drag-over {
        outline: 2px dashed var(--accent);
        background: var(--accent-soft);
      }

      .column-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.25rem;
      }

      .column-title {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--text);
      }

      .column-count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 2rem;
        height: 2rem;
        border-radius: 12px;
        background: var(--accent-soft);
        color: var(--accent-dark);
        font-size: 0.85rem;
        font-weight: 700;
      }

      .task-card {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem;
        background: var(--surface);
        margin-bottom: 1rem;
        transition: all 0.2s ease;
        box-shadow: var(--shadow-sm);
        cursor: grab;
      }

      .task-card:hover {
        box-shadow: var(--shadow-md);
        transform: translateY(-2px);
      }

      .task-card:active {
        cursor: grabbing;
      }

      .task-card:last-child {
        margin-bottom: 0;
      }

      .task-card.is-dragging {
        opacity: 0.5;
        transform: scale(0.95);
        box-shadow: none;
      }

      .board-status {
        margin-bottom: 1.5rem;
        padding: 1rem 1.25rem;
        border-radius: 12px;
        font-size: 0.95rem;
        font-weight: 500;
        display: none;
        border: 1px solid;
      }

      .board-status.loading {
        display: block;
        background: #eff6ff;
        color: #1e40af;
        border-color: #bfdbfe;
      }

      .board-status.error {
        display: block;
        background: #fef2f2;
        color: #991b1b;
        border-color: #fecaca;
      }

      .task-title {
        margin: 0 0 0.6rem;
        font-size: 1rem;
        font-weight: 700;
        color: var(--text);
        line-height: 1.4;
      }

      .task-description {
        margin: 0 0 0.9rem;
        color: var(--text-secondary);
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .task-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
        margin-bottom: 0.9rem;
        font-size: 0.85rem;
      }

      .pill {
        display: inline-block;
        padding: 0.35rem 0.75rem;
        border-radius: 12px;
        background: #f1f5f9;
        color: #475569;
        font-size: 0.8rem;
        font-weight: 600;
      }

      .priority-high {
        background: #fee2e2;
        color: #b91c1c;
      }

      .priority-medium {
        background: #fef3c7;
        color: #92400e;
      }

      .priority-low {
        background: #dcfce7;
        color: #166534;
      }

      .task-actions {
        display: flex;
        justify-content: flex-end;
      }

      .edit-button {
        border: none;
        border-radius: 8px;
        padding: 0.5rem 1rem;
        background: var(--accent);
        color: #ffffff;
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 600;
        transition: all 0.2s ease;
        box-shadow: var(--shadow-sm);
      }

      .edit-button:hover {
        background: var(--accent-dark);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }

      .edit-button:active {
        transform: translateY(0);
      }

      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(4px);
        z-index: 1000;
      }

      .modal-overlay.open {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .modal-dialog {
        background: var(--surface);
        border-radius: 20px;
        box-shadow: var(--shadow-lg);
        max-width: 500px;
        width: 90%;
        max-height: 90vh;
        overflow-y: auto;
        position: relative;
        animation: modalSlideIn 0.2s ease;
      }

      @keyframes modalSlideIn {
        from {
          opacity: 0;
          transform: scale(0.95) translateY(20px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      .modal-header {
        padding: 1.75rem 1.75rem 1rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .modal-title {
        margin: 0;
        font-size: 1.35rem;
        font-weight: 800;
        color: var(--text);
      }

      .modal-close {
        background: none;
        border: none;
        font-size: 1.75rem;
        cursor: pointer;
        color: var(--muted);
        padding: 0;
        width: 2.5rem;
        height: 2.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
        border-radius: 8px;
      }

      .modal-close:hover {
        color: var(--text);
        background: var(--bg);
      }

      .modal-body {
        padding: 1.75rem;
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      .form-label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 700;
        font-size: 0.9rem;
        color: var(--text);
      }

      .form-input,
      .form-textarea,
      .form-select {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 0.95rem;
        font-family: inherit;
        transition: all 0.2s ease;
        background: var(--surface);
        color: var(--text);
      }

      .form-input::placeholder,
      .form-textarea::placeholder {
        color: var(--muted);
      }

      .form-input:focus,
      .form-textarea:focus,
      .form-select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      .form-input.error,
      .form-textarea.error {
        border-color: #ef4444;
      }

      .form-input.error:focus,
      .form-textarea.error:focus {
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
      }

      .form-textarea {
        resize: vertical;
        min-height: 100px;
      }

      .form-error {
        color: #dc2626;
        font-size: 0.85rem;
        font-weight: 500;
        margin-top: 0.4rem;
        display: none;
      }

      .form-error.visible {
        display: block;
      }

      .form-banner-error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #991b1b;
        padding: 1rem;
        border-radius: 10px;
        margin-bottom: 1.25rem;
        display: none;
        font-size: 0.9rem;
        font-weight: 500;
      }

      .form-banner-error.visible {
        display: block;
      }

      .modal-footer {
        padding: 1.5rem 1.75rem;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 1rem;
        justify-content: flex-end;
      }

      .modal-button {
        border: none;
        border-radius: 10px;
        padding: 0.7rem 1.5rem;
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 700;
        transition: all 0.2s ease;
        font-family: inherit;
      }

      .modal-button-primary {
        background: var(--accent);
        color: #ffffff;
        box-shadow: var(--shadow-sm);
      }

      .modal-button-primary:hover {
        background: var(--accent-dark);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }

      .modal-button-primary:active {
        transform: translateY(0);
      }

      .modal-button-secondary {
        background: var(--border);
        color: var(--text);
        box-shadow: none;
      }

      .modal-button-secondary:hover {
        background: #cbd5e1;
      }

      .modal-button-secondary:active {
        background: #a1b2c7;
      }

      @media (max-width: 900px) {
        .board {
          grid-template-columns: 1fr;
        }
        .page-header-content {
          flex-direction: column;
          align-items: flex-start;
        }
        .new-task-button {
          align-self: flex-end;
        }
      }

      @media (max-width: 640px) {
        .page-header {
          padding: 1.5rem 1rem 1rem;
        }

        .page-header h1 {
          font-size: 1.75rem;
        }

        .page-header p {
          font-size: 0.85rem;
        }

        main {
          padding: 1rem;
        }

        .modal-dialog {
          width: 95%;
          margin: 0 auto;
        }

        .modal-header,
        .modal-body,
        .modal-footer {
          padding-left: 1.25rem;
          padding-right: 1.25rem;
        }
      }
    </style>
  </head>
  <body>
    <header class="page-header">
      <div class="page-header-content">
        <div>
          <h1>Task Tracker</h1>
          <p>Keep work moving across planning, execution, and completion.</p>
        </div>
        <button class="new-task-button" id="new-task-btn">+ New Task</button>
      </div>
    </header>

    <div class="modal-overlay" id="task-modal-overlay">
      <div class="modal-dialog">
        <div class="modal-header">
          <h2 class="modal-title" id="modal-title">New Task</h2>
          <button class="modal-close" id="modal-close-btn" type="button" aria-label="Close">×</button>
        </div>
        <div class="modal-body">
          <div class="form-banner-error" id="form-banner-error"></div>
          <form id="task-form" novalidate>
            <input type="hidden" id="form-task-id" />
            <div class="form-group">
              <label class="form-label" for="form-title">Title</label>
              <input type="text" id="form-title" class="form-input" placeholder="Enter task title" />
              <div class="form-error" id="form-title-error">Title is required</div>
            </div>
            <div class="form-group">
              <label class="form-label" for="form-description">Description</label>
              <textarea id="form-description" class="form-textarea" placeholder="Enter task description (optional)"></textarea>
            </div>
            <div class="form-group">
              <label class="form-label" for="form-status">Status</label>
              <select id="form-status" class="form-select">
                <option value="ToDo">To Do</option>
                <option value="InProgress">In Progress</option>
                <option value="Done">Done</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="form-priority">Priority</label>
              <select id="form-priority" class="form-select">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="form-assignee">Assignee</label>
              <input type="text" id="form-assignee" class="form-input" placeholder="Enter assignee name (optional)" />
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="modal-button modal-button-secondary" id="modal-cancel-btn" type="button">Cancel</button>
          <button class="modal-button modal-button-primary" id="modal-submit-btn" type="button">Create Task</button>
        </div>
      </div>
    </div>

    <main>
      <div class="board-status" id="board-status" role="status" aria-live="polite"></div>
      <section class="board" aria-label="Kanban board">
        <section class="column" data-status="ToDo">
          <div class="column-header">
            <h2 class="column-title">To Do</h2>
            <span class="column-count">0</span>
          </div>
          <div class="task-list"></div>
        </section>

        <section class="column" data-status="InProgress">
          <div class="column-header">
            <h2 class="column-title">In Progress</h2>
            <span class="column-count">0</span>
          </div>
          <div class="task-list"></div>
        </section>

        <section class="column" data-status="Done">
          <div class="column-header">
            <h2 class="column-title">Done</h2>
            <span class="column-count">0</span>
          </div>
          <div class="task-list"></div>
        </section>
      </section>
    </main>

    <script>
      const API_BASE = 'http://localhost:8000';
      const STATUS_ORDER = ['ToDo', 'InProgress', 'Done'];
      const STATUS_LABELS = {
        ToDo: 'To Do',
        InProgress: 'In Progress',
        Done: 'Done'
      };
      const PRIORITY_ORDER = {
        High: 0,
        Medium: 1,
        Low: 2
      };

      let tasks = [];
      let draggedTaskId = null;
      let boardState = 'loading';
      let isModalOpen = false;
      let currentTask = null;

      function escapeHtml(value) {
        return String(value ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function compareTasks(left, right) {
        const leftPriority = PRIORITY_ORDER[left.priority] ?? Number.MAX_SAFE_INTEGER;
        const rightPriority = PRIORITY_ORDER[right.priority] ?? Number.MAX_SAFE_INTEGER;

        if (leftPriority !== rightPriority) {
          return leftPriority - rightPriority;
        }

        const leftId = Number(left.id);
        const rightId = Number(right.id);

        if (Number.isFinite(leftId) && Number.isFinite(rightId)) {
          return leftId - rightId;
        }

        return String(left.id).localeCompare(String(right.id));
      }

      function setBoardStatus(state, message = '') {
        boardState = state;
        const statusElement = document.getElementById('board-status');

        if (!statusElement) {
          return;
        }

        statusElement.textContent = message;
        statusElement.className = `board-status ${state}`;
        statusElement.hidden = !message;
      }

      function renderBoard(taskList) {
        const columns = document.querySelectorAll('.column');

        columns.forEach((column) => {
          const status = column.dataset.status;
          const matchingTasks = taskList
            .filter((task) => task.status === status)
            .sort(compareTasks);
          const count = column.querySelector('.column-count');
          const body = column.querySelector('.task-list');

          if (count) {
            count.textContent = String(matchingTasks.length);
          }

          if (!body) {
            return;
          }

          if (boardState === 'loading') {
            body.innerHTML = '<p class="task-description">Loading tasks…</p>';
            return;
          }

          if (boardState === 'error' && matchingTasks.length === 0) {
            body.innerHTML = '<p class="task-description">Unable to load tasks.</p>';
            return;
          }

          if (matchingTasks.length === 0) {
            body.innerHTML = '<p class="task-description">No tasks yet. Create one from the API to see it here.</p>';
            return;
          }

          body.innerHTML = matchingTasks
            .map((task) => {
              const title = escapeHtml(task.title || 'Untitled task');
              const description = escapeHtml(task.description || '');
              const priority = escapeHtml(task.priority || 'Medium');
              const assignee = escapeHtml(task.assignee || 'Unassigned');
              const priorityClass = `priority-${priority.toLowerCase()}`;

              return `
                <article class="task-card" data-task-id="${escapeHtml(task.id)}" draggable="true">
                  <h3 class="task-title">${title}</h3>
                  ${description ? `<p class="task-description">${description}</p>` : ''}
                  <div class="task-meta">
                    <span class="pill ${priorityClass}">${priority} priority</span>
                    <span class="pill">Assignee: ${assignee}</span>
                  </div>
                  <div class="task-actions">
                    <button class="edit-button" type="button" data-task-id="${escapeHtml(task.id)}">Edit</button>
                  </div>
                </article>
              `;
            })
            .join('');
        });
      }

      function attachBoardListeners() {
        const board = document.querySelector('.board');
        if (!board) {
          return;
        }

        board.addEventListener('dragstart', handleDragStart);
        board.addEventListener('dragend', handleDragEnd);
        board.addEventListener('dragover', handleDragOver);
        board.addEventListener('dragleave', handleDragLeave);
        board.addEventListener('drop', handleDrop);
        board.addEventListener('click', handleEditButtonClick);
      }

      function handleEditButtonClick(event) {
        const editButton = event.target.closest('.edit-button');
        if (!editButton) {
          return;
        }

        const taskId = editButton.dataset.taskId;
        openEditTaskForm(taskId);
      }

      function handleDragStart(event) {
        const card = event.target.closest('.task-card');
        if (!card) {
          return;
        }

        draggedTaskId = card.dataset.taskId;
        card.classList.add('is-dragging');
        event.dataTransfer?.setData('text/plain', draggedTaskId || '');
        event.dataTransfer.effectAllowed = 'move';
      }

      function handleDragEnd(event) {
        const card = event.target.closest('.task-card');
        if (!card) {
          return;
        }

        card.classList.remove('is-dragging');
        document.querySelectorAll('.column').forEach((column) => column.classList.remove('drag-over'));
        draggedTaskId = null;
      }

      function handleDragOver(event) {
        const column = event.target.closest('.column');
        if (!draggedTaskId || !column) {
          return;
        }

        event.preventDefault();
        column.classList.add('drag-over');
      }

      function handleDragLeave(event) {
        const column = event.target.closest('.column');
        if (!column) {
          return;
        }

        if (column.contains(event.relatedTarget)) {
          return;
        }

        column.classList.remove('drag-over');
      }

      async function handleDrop(event) {
        event.preventDefault();
        const column = event.target.closest('.column');
        if (!column) {
          draggedTaskId = null;
          return;
        }

        const targetStatus = column.dataset.status;
        const taskId = draggedTaskId;
        const task = tasks.find((item) => String(item.id) === String(taskId));

        column.classList.remove('drag-over');

        if (!task || !taskId || task.status === targetStatus) {
          draggedTaskId = null;
          return;
        }

        const previousTasks = tasks.map((item) => ({ ...item }));
        tasks = tasks.map((item) => (
          String(item.id) === String(taskId) ? { ...item, status: targetStatus } : item
        ));
        renderBoard(tasks);

        try {
          const response = await fetch(`${API_BASE}/tasks/${taskId}`, {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ status: targetStatus })
          });

          if (!response.ok) {
            const errorMessage = await parseErrorMessage(response);
            tasks = previousTasks;
            setBoardStatus('error', errorMessage);
            renderBoard(tasks);
            return;
          }

          const updatedTask = await response.json();
          tasks = tasks.map((item) => (
            String(item.id) === String(updatedTask.id) ? updatedTask : item
          ));
          setBoardStatus('ready', '');
          renderBoard(tasks);
        } catch (error) {
          console.error('Unable to update task status:', error);
          tasks = previousTasks;
          setBoardStatus('error', 'Unable to update task. Please check your connection and try again.');
          renderBoard(tasks);
        } finally {
          draggedTaskId = null;
        }
      }

      async function parseErrorMessage(response) {
        try {
          const payload = await response.json();

          if (typeof payload?.detail === 'string') {
            return payload.detail;
          }

          if (Array.isArray(payload?.detail) && payload.detail.length > 0) {
            return payload.detail[0]?.msg || 'Unable to update task.';
          }
        } catch (error) {
          console.error('Unable to parse error payload:', error);
        }

        return 'Unable to update task.';
      }

      function openNewTaskForm() {
        currentTask = null;
        clearFormFields();
        clearFormErrors();
        document.getElementById('modal-title').textContent = 'New Task';
        document.getElementById('modal-submit-btn').textContent = 'Create Task';
        openModal();
      }

      function openEditTaskForm(taskId) {
        const task = tasks.find((t) => String(t.id) === String(taskId));
        if (!task) {
          return;
        }

        currentTask = task;
        populateFormFields(task);
        clearFormErrors();
        document.getElementById('modal-title').textContent = 'Edit Task';
        document.getElementById('modal-submit-btn').textContent = 'Save Changes';
        openModal();
      }

      function openModal() {
        isModalOpen = true;
        document.getElementById('task-modal-overlay').classList.add('open');
        document.getElementById('form-title').focus();
      }

      function closeModal() {
        isModalOpen = false;
        document.getElementById('task-modal-overlay').classList.remove('open');
        clearFormFields();
        clearFormErrors();
        currentTask = null;
      }

      function clearFormFields() {
        document.getElementById('form-task-id').value = '';
        document.getElementById('form-title').value = '';
        document.getElementById('form-description').value = '';
        document.getElementById('form-status').value = 'ToDo';
        document.getElementById('form-priority').value = 'Medium';
        document.getElementById('form-assignee').value = '';
      }

      function populateFormFields(task) {
        document.getElementById('form-task-id').value = task.id || '';
        document.getElementById('form-title').value = task.title || '';
        document.getElementById('form-description').value = task.description || '';
        document.getElementById('form-status').value = task.status || 'ToDo';
        document.getElementById('form-priority').value = task.priority || 'Medium';
        document.getElementById('form-assignee').value = task.assignee || '';
      }

      function clearFormErrors() {
        document.getElementById('form-title').classList.remove('error');
        document.getElementById('form-title-error').classList.remove('visible');
        document.getElementById('form-banner-error').classList.remove('visible');
        document.getElementById('form-banner-error').textContent = '';
      }

      function validateForm() {
        const titleInput = document.getElementById('form-title');
        const title = titleInput.value.trim();

        if (!title) {
          titleInput.classList.add('error');
          document.getElementById('form-title-error').classList.add('visible');
          return false;
        }

        titleInput.classList.remove('error');
        document.getElementById('form-title-error').classList.remove('visible');
        return true;
      }

      async function submitForm() {
        if (!validateForm()) {
          return;
        }

        const taskId = document.getElementById('form-task-id').value;
        const title = document.getElementById('form-title').value.trim();
        const description = document.getElementById('form-description').value.trim();
        const status = document.getElementById('form-status').value;
        const priority = document.getElementById('form-priority').value;
        const assigneeInput = document.getElementById('form-assignee').value.trim();
        const assignee = assigneeInput || null;

        if (currentTask) {
          const payload = {};

          if (title !== (currentTask.title || '')) {
            payload.title = title;
          }

          if ((description || '') !== (currentTask.description || '')) {
            payload.description = description || '';
          }

          if (status !== (currentTask.status || 'ToDo')) {
            payload.status = status;
          }

          if (priority !== (currentTask.priority || 'Medium')) {
            payload.priority = priority;
          }

          if (assignee !== (currentTask.assignee || null)) {
            payload.assignee = assignee;
          }

          if (Object.keys(payload).length === 0) {
            closeModal();
            return;
          }

          await submitEditTask(taskId, payload);
          return;
        }

        const payload = {
          title,
          description: description || '',
          status,
          priority,
          assignee
        };
        await submitNewTask(payload);
      }

      async function submitNewTask(payload) {
        try {
          const response = await fetch(`${API_BASE}/tasks`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            const errorMessage = await parseErrorMessage(response);
            document.getElementById('form-banner-error').textContent = errorMessage;
            document.getElementById('form-banner-error').classList.add('visible');
            return;
          }

          closeModal();
          await fetchTasks();
        } catch (error) {
          console.error('Unable to create task:', error);
          document.getElementById('form-banner-error').textContent = 'Unable to create task. Please check your connection and try again.';
          document.getElementById('form-banner-error').classList.add('visible');
        }
      }

      async function submitEditTask(taskId, payload) {
        try {
          const response = await fetch(`${API_BASE}/tasks/${taskId}`, {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            const errorMessage = await parseErrorMessage(response);
            document.getElementById('form-banner-error').textContent = errorMessage;
            document.getElementById('form-banner-error').classList.add('visible');
            return;
          }

          closeModal();
          await fetchTasks();
        } catch (error) {
          console.error('Unable to update task:', error);
          document.getElementById('form-banner-error').textContent = 'Unable to update task. Please check your connection and try again.';
          document.getElementById('form-banner-error').classList.add('visible');
        }
      }

      function attachModalListeners() {
        document.getElementById('new-task-btn').addEventListener('click', openNewTaskForm);
        document.getElementById('modal-close-btn').addEventListener('click', closeModal);
        document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
        document.getElementById('modal-submit-btn').addEventListener('click', submitForm);
        document.getElementById('task-modal-overlay').addEventListener('click', (event) => {
          if (event.target.id === 'task-modal-overlay') {
            closeModal();
          }
        });
        document.addEventListener('keydown', (event) => {
          if (event.key === 'Escape' && isModalOpen) {
            closeModal();
          }
        });
      }

      async function fetchTasks() {
        setBoardStatus('loading', 'Loading tasks…');

        try {
          const response = await fetch(`${API_BASE}/tasks`);

          if (!response.ok) {
            throw new Error(`Request failed with status ${response.status}`);
          }

          const data = await response.json();
          tasks = Array.isArray(data) ? data : [];
          setBoardStatus('ready', '');
          renderBoard(tasks);
        } catch (error) {
          console.error('Unable to load tasks:', error);
          tasks = [];
          setBoardStatus('error', 'Unable to load tasks right now.');
          renderBoard(tasks);
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        attachBoardListeners();
        attachModalListeners();
        fetchTasks();
      });
    </script>
  </body>
</html>
